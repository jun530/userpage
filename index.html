<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人頁面</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/userpage.css">
    <style>
        body {
            background-color: var(--bg-primary);
        }
        .s01{
            background-color:var(--bg-secondary);
            height:100vh ;
            position: relative;
        }
        /* s01 */
        .s01 .box01 {
            width: 200px;
            height: 200px;
            background-color: var(--bg-dark);
            position: absolute;
            top: 0;
            left: 0;
        }

        .s01 .box02 {
            width: 200px;
            height: 200px;
            background-color: var(--bg-dark);
            position: absolute;
            top: 0;
            right: 0;
        }

        .s01 .box03{
            width: 200px;
            height: 200px;
            background-color: var(--bg-dark);
            position: absolute;
            left: 0;
            bottom: 0;
        }
        .s01 .box04{
            width: 200px;
            height: 200px;
            background-color: var(--bg-dark);
            position: absolute;
            right: 0;
            bottom: 0;
        }
        .s01 .userImg{          
            position: absolute;
            top: 100px;
            bottom: 100px;
            left: 100px;
            right: 100px;
            background-image: url(images/person01.avif);
            background-position: center, center;
            background-size: cover;
            border-radius: 10px;
            box-shadow: var(--bg-hero);
        }
        .usertext{
            position: absolute;
            top: 60%;
            left: 10%;
            right: 60%;
        }
        /* s02 */
        .s02{
            padding: 80px 10%;
            background-color: var(--text-content);
            text-align: center;
        }
        .s02 h2{
            font-size: 36px;
        }
        .s02 .card{
            display: inline-block;
            margin: 15px;
            width: 240px;
            background-color: var(--portfolio-card);
            padding: 20px;
            text-align: left;
            border-radius: 12px;
        }

        .s02 .card h3{
            color: var(--skill-text);
            margin-top: 0;
        }
        .s02 .card p{
            line-height: 1.7;
            color: var(--text-content);
        }
        .s02 .card a{
            display: block;
            background-color: var(--btn-secondary);
            text-decoration: none;
            width: 80px;
            height: 40px;
            font-size: 15px;
            line-height: 40px;
            border-radius: 7px;
        }
    </style>
</head>

<body>
    <section class="s01">
        <div class="box01"></div>
        <div class="box02"></div>
        <div class="box03"></div>
        <div class="box04"></div>
        <div class="userImg"></div>
        <div class="usertext">
            <h1>我的履歷</h1>
            <hr>
            <h2>應徵職位:軟體工程師</h2>
            <p>最佳世紀小時一家引發用戶女生您現在，吃了台中各自，你看周邊。
            </p>
        </div>
    </section>
    <section class="s02">
        <h2>我的作品</h2>

        <!-- 作品01 -->
         <div class="card">
            <h3>切版練習</h3>
            <p>使用html、css、Javascript練習切版</p>
            <a href="20260527.html">查看作品</a>
         </div>
         <!-- 作品02 -->
         <div class="card">
            <h3>Table排版</h3>
            <p>使用html、css、Javascript排版練習</p>
            <a href="20260605-ch5-.html">查看作品</a>
         </div>
         <!-- 作品03 -->
         <div class="card">
            <h3>Google</h3>
            <p>使用GOOGLE搜尋</p>
            <a href="https://www.google.com/">查看作品</a>
         </div>
    </section>
</body>

</html>
