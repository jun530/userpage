<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch11 表單練習(JavaScript)</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body {
            background: #eef2f7;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 整個表單 */
        #s01>.row,
        #s02 {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
            padding: 25px;
        }

        /* 標題 */
        .display-4,
        .display-5 {
            border-radius: 10px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .display-4 {
            background: #0d6efd !important;
        }

        .display-5 {
            background: #198754 !important;
        }

        /* Label */
        .form-label,
        label {
            font-weight: 600;
            color: #555;
        }

        /* Input */
        .form-control,
        .form-select {

            border-radius: 8px;
            border: 1px solid #ced4da;
            transition: .2s;
            box-shadow: none;
        }

        .form-control:focus,
        .form-select:focus {

            border-color: #0d6efd;
            box-shadow: 0 0 0 .15rem rgba(13, 110, 253, .15);
        }

        /* 浮動輸入框 */
        .form-floating>label {
            color: #666;
        }

        /* Switch */
        .form-switch {
            margin-top: 25px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        /* Checkbox Radio 區塊 */

        #topping_group,
        #supply_group {

            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            padding: 15px;
        }

        /* 每一列 */

        .form-check {

            margin-bottom: 8px;
        }

        .form-check:last-child {

            margin-bottom: 0;
        }

        /* 驗證 */

        .is-valid {

            border-color: #198754 !important;
        }

        .is-invalid {

            border-color: #dc3545 !important;
        }

        /* feedback */

        .valid-feedback,
        .invalid-feedback {

            font-size: 14px;
        }

        /* 按鈕 */

        .btn {

            min-width: 120px;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-primary {

            background: #0d6efd;
        }

        .btn-secondary {

            background: #6c757d;
        }

        .btn-warning {

            color: #fff;
        }

        /* 按鈕hover */

        .btn:hover {

            transform: translateY(-1px);
            transition: .2s;
        }

        /* 明細 */

        #showmessage {

            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 20px;
        }

        #showmessage h3 {

            font-size: 20px;
            border-bottom: 1px dashed #ddd;
            padding: 10px 0;
            margin: 0;
        }

        #showmessage h3:last-child {

            border-bottom: none;
        }

        /* datalist輸入 */

        input[list] {

            background: #fff;
        }

        /* 欄位間距 */

        .mb-3 {

            margin-bottom: 22px !important;
        }

        /* RWD */

        @media (max-width:768px) {

            .display-4,
            .display-5 {

                font-size: 26px;
            }

            #s01>.row,
            #s02 {

                padding: 18px;
            }

        }
    </style>
</head>

<body>
    <div class="container pt-5">
        <div class="row" id="s01">
            <div class="row justify-content-center">
                <div class="display-4 fw-900 text-center text-bg-primary py-2"><i class="fa-solid fa-mug-hot"></i> 飲料產品</div>
                <div class="col-md-6 mt-3">
                    <div class="mb-3 form-floating">
                        <input type="text" class="form-control form-control-lg" name="" id="pname" placeholder=""
                            list="datalistoption">
                        <label for="pname" class="form-label">產品名稱(字數1~6)</label>
                        <div class="valid-feedback">產品名稱符合規定</div>
                        <div class="invalid-feedback">產品名稱不符合規定</div>
                        <datalist id="datalistoption">
                            <option value="烏龍拿鐵"></option>
                            <option value="冰淇淋紅茶"></option>
                            <option value="珍珠奶茶"></option>
                        </datalist>

                        <div class="mb-3">
                            <label for="pnum">數量(1~10)</label>
                            <input type="number" class="form-control form-control-lg" min="1" max="10" id="pnum"
                                placeholder="請輸入數量">
                            <div class="valid-feedback">數量符合規定</div>
                            <div class="invalid-feedback">數量不符合規定</div>
                        </div>
                        <!-- 使用Datalist做出產品簡介(規格、備註) -->
                    </div>
                    <div class="mb-3">
                        <label for="pstandard">產品規格</label>
                        <input type="text" class="form-control form-control-lg" id="pstandard" list="datalistoption2"
                            placeholder="產品規格">
                        <datalist id="datalistoption2">
                            <option value="正常冰"></option>
                            <option value="微冰"></option>
                            <option value="去冰"></option>
                        </datalist>
                        <div class="valid-feedback">已確認尺寸</div>
                        <div class="invalid-feedback">請輸入尺寸</div>
                    </div>
                    <div class="mb-3">
                        <select name="" id="psize" class="form-select form-select-lg">
                            <option value="" disabled selected class="text-center fw-900">***請選擇容量***</option>
                            <option value="特大(2000cc以上)">特大(2000cc以上)</option>
                            <option value="大(1000cc-2000cc)">大(1000cc-2000cc)</option>
                            <option value="中(500cc-1000cc)">中(500cc-1000cc)</option>
                            <option value="小(500cc以下)">小(500cc以下)</option>
                        </select>
                        <div class="valid-feedback">已確認容量</div>
                        <div class="invalid-feedback">請選擇容量</div>
                    </div>
                    <div class="mb-3 form-check form-switch">
                        <input type="checkbox" name="" id="pstatus" class="form-check-input">
                        <label for="" class="form-check-label" id="pstatus_text">目前狀態 : 下架</label>
                    </div>
                    <div class="mb-3">
                        <div class="form-label fw-900">可加配料:至少要加一種</div>
                        <div id="topping_group" class="is-invalid">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input topping_item" value="珍珠">
                                <label for="" class="form-check-label">珍珠</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input topping_item" value="椰果">
                                <label for="" class="form-check-label">椰果</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input topping_item" value="蒟蒻">
                                <label for="" class="form-check-label">蒟蒻</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input topping_item" value="布丁">
                                <label for="" class="form-check-label">布丁</label>
                            </div>
                        </div>
                        <div class="valid-feedback">配料已選擇</div>
                        <div class="invalid-feedback">至少要加一種配料</div>
                    </div>

                    <div class="mb-3">
                        <div class="form-label fw-900">供應方式:至少選一項</div>
                        <div id="supply_group" class="is-invalid">
                            <div class="form-check">
                                <input type="radio" class="form-check-input supply_item" name="supply" value="冷飲">
                                <label for="" class="form-check-label">冷飲</label>
                            </div>
                            <div class="form-check">
                                <input type="radio" class="form-check-input supply_item" name="supply" value="熱飲">
                                <label for="" class="form-check-label">熱飲</label>
                            </div>
                            <div class="form-check">
                                <input type="radio" class="form-check-input supply_item" name="supply" value="冷熱皆可">
                                <label for="" class="form-check-label">冷熱皆可</label>
                            </div>
                        </div>
                        <div class="valid-feedback">供應已選擇</div>
                        <div class="invalid-feedback">未選擇供應方式</div>
                    </div>
                    <div class="text-end mt-4">
                        <button class="btn btn-secondary"><i class="fa-solid fa-xmark"></i>取消</button>
                        <button class="btn btn-primary" id="ok_btn"><i class="fa-solid fa-check"></i>確認</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-5 justify-content-center d-none" id="s02">
            <div class="display-5 fw-900 text-center text-bg-success py-2 rounded-3">飲料產品建檔-明細確認</div>
            <div class="col-md-6 p-3">
                <div id="showmessage"></div>
                <button class="btn btn-secondary mt-3 w-100">取消</button>
                <button class="btn btn-warning mt-3 w-100">確認送出</button>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let flag_pname = false;
        let flag_pnum = false;
        let flag_pstandard = false;
        let flag_psize = false;
        let flag_topping = false;
        let flag_supply = false;
        $(function () {
            //監聽#pname
            $("#pname").on("input", function () {
                console.log($(this).val().length);
                let pname = $(this).val().trim();

                if (pname.length >= 1 && pname.length <= 6) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pname = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pname = false;
                }
            });
            //監聽#pnum 數字記得使用Number()
            $("#pnum").on("input", function () {
                console.log($(this).val());
                let pnum = Number($(this).val());
                if (pnum >= 1 && pnum <= 10) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pnum = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pnum = false;
                }
            });
            //監聽#pstandard
            $("#pstandard").on("input", function () {
                console.log($(this).val().length);
                let pstandard = $(this).val().trim();
                if (pstandard.length >= 1 && pstandard.length <= 6) {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_pstandard = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_pstandard = false;
                }
            });
            //監聽#psize
            $("#psize").on("change", function () {
                console.log($(this).val().length);
                let psize = $(this).val().trim();

                if (psize != "") {
                    //符合規定
                    $(this).removeClass("is-invalid");
                    $(this).addClass("is-valid");
                    flag_psize = true;
                } else {
                    //不符合規定
                    $(this).removeClass("is-valid");
                    $(this).addClass("is-invalid");
                    flag_psize = false;
                }
            });
            //監聽#pstatus
            $("#pstatus").on("change", function () {
                console.log($(this).prop("checked"))

                let pstatus = $(this).prop("checked");
                if (pstatus) {
                    $("#pstatus_text").text("目前狀態 : 上架")
                } else {
                    $("#pstatus_text").text("目前狀態 : 下架")
                }
            })
            //監聽.topping_item
            $(".topping_item").on("change", function () {
                console.log($(".topping_item:checked").length);
                let count = $(".topping_item:checked").length;
                if (count > 0) {
                    $("#topping_group").removeClass("is-invalid");
                    $("#topping_group").addClass("is-valid");
                    flag_topping = true;
                } else {
                    $("#topping_group").addClass("is-invalid");
                    $("#topping_group").removeClass("is-valid");
                    flag_topping = false;
                }
            });
            //監聽.supply_item
            $(".supply_item").on("change", function () {
                console.log($(".supply_item:checked").val());
                let supply = $(".supply_item:checked").val();
                if (supply != undefined) {
                    $("#supply_group").removeClass("is-invalid");
                    $("#supply_group").addClass("is-valid");
                    flag_supply = true;
                } else {
                    $("#supply_group").addClass("is-invalid");
                    $("#supply_group").removeClass("is-valid");
                    flag_supply = false;
                }
            });
            //按鈕監聽 #ok_btn
            $("#ok_btn").on("click", function () {
                if (flag_pname && flag_pnum && flag_psize && flag_pstandard && flag_topping && flag_supply) {
                    $("#s02").removeClass("d-none")

                    //三元運算子
                    let pstatus = $("#pstatus").prop("checked") ? "上架" : "下架";

                    //收集可加配料
                    let toppingArray = [];
                    $(".topping_item:checked").each(function () {
                        toppingArray.push($(this).val());
                    });
                    //供應方式
                    let supply = $(".supply_item:checked").val()

                    let strHTML = `<h3>產品名稱:${$("#pname").val()}</h3>
                                    <h3>產品數量:${$("#pnum").val()}</h3>
                                    <h3>產品規格:${$("#pstandard").val()}</h3>
                                    <h3>產品容量:${$("#psize").val()}</h3>
                                    <h3>目前狀態:${pstatus}</h3>
                                    <h3>選取配料:${toppingArray.join(",")}</h3>
                                    <h3>供應方式:${supply}</h3>`;
                    $("#showmessage").html(strHTML);

                } else {
                    Swal.fire({
                        title: "欄位錯誤?",
                        text: "欄位錯誤，請修正。",
                        icon: "error",
                    });
                    $("#s02").addClass("d-none");
                }
            })

        })  
    </script>
</body>

</html>
